name: "Workflow CI - Credit Risk Model Training & Docker Build"

# ─── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 16 * * 0"  # Setiap hari Minggu 23:00 WIB = 16:00 UTC
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Number of trees in Random Forest"
        default: "200"
      max_depth:
        description: "Max tree depth"
        default: "12"

# ─── Global Environment Variables ──────────────────────────────────────────────
env:
  DOCKER_IMAGE_NAME: credit-risk-model
  MLPROJECT_DIR: MLProject         # Root-relative path (standalone repo)
  PYTHON_VERSION: "3.10"

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Train Model via MLflow Project & Upload Artifact
  # ════════════════════════════════════════════════════════════════════════════
  train-and-track:
    name: "Train Model via MLflow Project"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "Install Dependencies"
        run: |
          pip install --upgrade pip
          pip install \
            mlflow==2.19.0 \
            scikit-learn==1.5.2 \
            dagshub==0.3.36 \
            numpy==1.26.4 \
            pandas==2.2.3 \
            matplotlib==3.9.2 \
            seaborn==0.13.2 \
            xgboost==2.1.1

      - name: "Run MLflow Project (Training + DagsHub Logging)"
        env:
          # DevSecOps: semua credential dari GitHub Secrets — TIDAK ada hardcoded values
          DAGSHUB_TOKEN:            ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN:       ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI:      "https://dagshub.com/Adrian463588/CreditRiskPrediction.mlflow"
        run: |
          cd ${{ env.MLPROJECT_DIR }}
          mlflow run . \
            --experiment-name "credit-risk-workflow-ci" \
            --env-manager=local \
            -P n_estimators=${{ github.event.inputs.n_estimators || '200' }} \
            -P max_depth=${{ github.event.inputs.max_depth || '12' }}

      - name: "Verify Model Artifact Exists"
        run: |
          MODEL_PATH="${{ env.MLPROJECT_DIR }}/artifacts/credit-risk-model"
          if [ ! -f "${MODEL_PATH}/MLmodel" ]; then
            echo "❌ ERROR: MLmodel file tidak ditemukan di ${MODEL_PATH}"
            exit 1
          fi
          echo "✅ Model artifact valid: $(ls ${MODEL_PATH})"

      - name: "Upload Model Artifact to GitHub Actions"
        uses: actions/upload-artifact@v4
        with:
          name: "credit-risk-model-artifact"
          path: ${{ env.MLPROJECT_DIR }}/artifacts/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Build & Push Docker Image
  # ════════════════════════════════════════════════════════════════════════════
  docker-build-push:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: train-and-track

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Download Model Artifact from Job 1"
        uses: actions/download-artifact@v4
        with:
          name: "credit-risk-model-artifact"
          path: ${{ env.MLPROJECT_DIR }}/artifacts/

      - name: "Verify Downloaded Model"
        run: |
          MODEL_PATH="${{ env.MLPROJECT_DIR }}/artifacts/credit-risk-model"
          if [ ! -f "${MODEL_PATH}/MLmodel" ]; then
            echo "❌ ERROR: Model artifact tidak valid atau tidak ditemukan"
            exit 1
          fi
          echo "✅ Model siap untuk Docker build"
          cat "${MODEL_PATH}/MLmodel"

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build Docker Image (Custom Dockerfile — python:3.10-slim)"
        # Menggunakan custom Dockerfile multi-stage — BUKAN mlflow models build-docker
        # Alasan: mlflow build-docker default image >3 GB & build >30 menit
        # Custom slim: ~500 MB & build ~3-5 menit
        run: |
          docker build \
            --file ${{ env.MLPROJECT_DIR }}/Dockerfile \
            --tag "${{ env.DOCKER_IMAGE_NAME }}:latest" \
            --tag "${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}" \
            --label "git-commit=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            ${{ env.MLPROJECT_DIR }}

      - name: "Smoke Test Docker Image"
        run: |
          docker run --rm "${{ env.DOCKER_IMAGE_NAME }}:latest" \
            python -c "
          import mlflow.pyfunc
          model = mlflow.pyfunc.load_model('/app/model')
          print('✅ Model loaded successfully — type:', type(model))
          "

      - name: "Tag & Push Docker Image to Docker Hub"
        run: |
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}"
          docker tag "${{ env.DOCKER_IMAGE_NAME }}:latest"            "${IMAGE_TAG}:latest"
          docker tag "${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}" "${IMAGE_TAG}:${{ github.sha }}"
          docker push "${IMAGE_TAG}:latest"
          docker push "${IMAGE_TAG}:${{ github.sha }}"
          echo "✅ Pushed: ${IMAGE_TAG}:latest"

      - name: "Update Docker Hub Reference File"
        run: |
          cat > ${{ env.MLPROJECT_DIR }}/docker_hub_reference.txt <<EOF
          Docker Hub Repository : https://hub.docker.com/repository/docker/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}/general
          Docker Image Name     : ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          Pull Command          : docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          Run Command           : docker run -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          Built at              : $(date -u)
          Git Commit            : ${{ github.sha }}
          EOF

      - name: "Upload Docker Reference as Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "docker-hub-reference"
          path: ${{ env.MLPROJECT_DIR }}/docker_hub_reference.txt
